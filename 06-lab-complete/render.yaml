services:
  - type: web
    name: lab11-guardrails-agent
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: "Lab 11 Guardrails Agent"
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_BUDGET_USD
        value: "5.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
      # Lab 11: Guardrails
      - key: ENABLE_INPUT_GUARDRAILS
        value: "true"
      - key: ENABLE_OUTPUT_GUARDRAILS
        value: "true"
      - key: ENABLE_INJECTION_DETECTION
        value: "true"
      - key: ENABLE_TOPIC_FILTER
        value: "true"
      # Lab 11: HITL
      - key: ENABLE_HITL
        value: "true"
      - key: CONFIDENCE_THRESHOLD_HIGH
        value: "0.8"
      - key: CONFIDENCE_THRESHOLD_LOW
        value: "0.3"
